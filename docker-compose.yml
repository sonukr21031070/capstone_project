# ============================================================
# FILE: docker-compose.yml (at project root)
# ============================================================
version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: edlearn-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: edlearn_db
      MYSQL_USER: edlearn_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-edlearn_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: edlearn-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/edlearn_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      DB_USERNAME: edlearn_user
      DB_PASSWORD: ${DB_PASSWORD:-edlearn_pass}
      JWT_SECRET: ${JWT_SECRET:-SIH25019-EdLearn-SecretKey-Nabha-Rural-Education-Platform-2024}
      UPLOAD_PATH: /uploads/edlearn
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/uploads/edlearn
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: edlearn-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"

volumes:
  mysql_data:
  uploads_data:

networks:
  default:
    name: edlearn-network

