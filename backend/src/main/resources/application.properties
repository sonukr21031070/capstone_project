# ============================================================
# SIH25019 EdLearn Platform - Application Configuration
# ============================================================

# Server
server.port=8080
server.servlet.context-path=/api

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/edlearn_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sks@2028
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:SIH25019-EdLearn-SecretKey-Nabha-Rural-Education-Platform-2024}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
app.upload.base-path=${UPLOAD_PATH:/uploads/edlearn}
app.upload.notes-path=${app.upload.base-path}/notes
app.upload.videos-path=${app.upload.base-path}/videos
app.upload.thumbnails-path=${app.upload.base-path}/thumbnails
app.upload.profile-photos-path=${app.upload.base-path}/profiles

# Email Configuration (Production)
# These should be set via environment variables in production
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.socketFactory.port=587
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
spring.mail.properties.mail.from=${MAIL_FROM:edlearn@nabha.gov.in}
# Custom EdLearn mail properties used by EmailService
spring.mail.from=${MAIL_FROM:edlearn@nabha.gov.in}
spring.mail.from-name=${MAIL_FROM_NAME:EdLearn Platform}

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Pagination
app.pagination.default-page-size=10
app.pagination.max-page-size=50

# Logging
logging.level.com.sih.edlearn=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Application Configuration
spring.application.name=EdLearn
spring.profiles.active=dev
spring.web.resources.add-mappings=true
spring.mvc.static-path-pattern=/uploads/**
spring.web.resources.static-locations=file:${app.upload.base-path}/

